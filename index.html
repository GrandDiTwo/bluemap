<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>JadeHarley Space Map</title>

  <meta name="description" content="Live BlueMap map for jadeharley.space" />
  <meta name="theme-color" content="#006EDE" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070a;
      font-family: Arial, sans-serif;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #0d1b2a 0%, #05070a 70%);
      color: white;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .box {
      text-align: center;
      padding: 24px;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .sub {
      font-size: 14px;
      opacity: 0.75;
      margin-bottom: 18px;
    }

    .spinner {
      width: 42px;
      height: 42px;
      margin: 0 auto;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: 0;
      display: block;
      background: #000;
    }

    .top-link {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 20;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      font-size: 13px;
      text-decoration: none;
      backdrop-filter: blur(6px);
    }

    .top-link:hover {
      background: rgba(0, 0, 0, 0.85);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="loading">
    <div class="box">
      <div class="title">Loading</div>
      <div class="sub">If ngrok shows a warning, click through once.</div>
      <div class="spinner"></div>
    </div>
  </div>

  <iframe
    id="mapFrame"
    src=""
    allow="fullscreen"
    allowfullscreen
    referrerpolicy="no-referrer">
  </iframe>



  <script>
    const MAP_URL = "https://marcos-agrologic-untorpidly.ngrok-free.dev/#world:0:3:-1:5:0:0:0:0:perspective";

    const frame = document.getElementById("mapFrame");
    const loading = document.getElementById("loading");


    frame.src = MAP_URL;


    frame.addEventListener("load", () => {
      setTimeout(() => {
        loading.classList.add("hidden");
      }, 500);
    });

    setTimeout(() => {
      loading.classList.add("hidden");
    }, 8000);
  </script>
</body>
</html>
